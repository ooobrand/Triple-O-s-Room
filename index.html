<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الغرفة الافتراضية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Tajawal', -apple-system, sans-serif; background: #fafafa; color: #1a1a1a; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  
  .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
  
  .welcome { text-align: center; padding: 30px 10px; }
  
  .welcome-icon {
    width: 72px; height: 72px; margin: 0 auto 20px;
    background: #1a1a1a; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .welcome-icon svg { width: 36px; height: 36px; fill: #fff; }
  
  .welcome-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .welcome-sub { font-size: 15px; color: #666; line-height: 1.7; max-width: 320px; margin: 0 auto 28px; }
  
  .start-btn {
    background: #1a1a1a; color: #fff; border: none;
    padding: 18px 36px; border-radius: 50px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    font-family: inherit; -webkit-appearance: none;
    display: inline-flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transition: all 0.2s;
  }
  .start-btn:active { transform: scale(0.97); background: #333; }
  .start-btn svg { width: 22px; height: 22px; fill: currentColor; }
  
  .privacy-note {
    font-size: 12px; color: #999;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 16px;
  }
  
  .selection-screen { display: none; }
  .selection-screen.active { display: block; }
  
  /* === Face Analysis Screen === */
  .analysis-screen { display: none; }
  .analysis-screen.active { display: block; }
  
  .analysis-preview {
    background: #1a1a1a;
    border-radius: 20px;
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .analysis-preview video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  .analysis-preview canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .analysis-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #fff; gap: 18px;
    padding: 20px; text-align: center;
  }
  .analysis-icon {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .analysis-icon svg {
    width: 36px; height: 36px;
    fill: #fff;
  }
  .analysis-icon.pulse {
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }
  .analysis-title {
    font-size: 18px; font-weight: 700;
    line-height: 1.4;
  }
  .analysis-sub {
    font-size: 13px; opacity: 0.9;
    line-height: 1.6; max-width: 280px;
  }
  .analysis-progress {
    width: 200px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden;
    margin-top: 8px;
  }
  .analysis-progress-bar {
    height: 100%; background: #fff;
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 2px;
  }
  
  /* === Face Match Result Banner === */
  .face-match-banner {
    background: linear-gradient(135deg, #f8f8f8 0%, #fff 100%);
    border: 1.5px solid #e8e8e8;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .face-match-emoji {
    font-size: 28px;
    flex-shrink: 0;
  }
  .face-match-info {
    flex: 1; min-width: 0;
  }
  .face-match-title {
    font-size: 14px; font-weight: 700;
    color: #1a1a1a; margin-bottom: 2px;
  }
  .face-match-desc {
    font-size: 11px; color: #777;
    line-height: 1.5;
  }
  
  /* === Product card match score === */
  .product-card { position: relative; }
  
  .match-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: #1a1a1a;
    color: #fff;
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 10px;
    margin-top: 4px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .match-badge.high {
    background: linear-gradient(135deg, #1a1a1a, #444);
  }
  .match-badge.perfect {
    background: linear-gradient(135deg, #b8893f, #d4a85a);
    color: #1a1a1a;
  }
  .match-stars {
    color: #d4a85a;
    font-size: 12px;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  
  .screen-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; padding: 4px 0;
  }
  .back-btn {
    background: #fff; border: 1px solid #e8e8e8; width: 38px; height: 38px;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center;
    justify-content: center; -webkit-appearance: none;
  }
  .back-btn svg { width: 18px; height: 18px; fill: #1a1a1a; }
  .screen-title { font-size: 16px; font-weight: 600; }
  .header-spacer { width: 38px; }
  
  .selection-intro { text-align: center; padding: 6px 16px 20px; }
  .selection-intro h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .selection-intro p { font-size: 13px; color: #666; line-height: 1.6; }
  
  .products-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding-bottom: 20px;
  }
  
  .product-card {
    background: #fff;
    border: 1.5px solid #f0f0f0;
    border-radius: 16px;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-appearance: none;
    font-family: inherit;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .product-card:active {
    border-color: #1a1a1a;
    transform: scale(0.97);
    background: #fafafa;
  }
  
  .product-image-box {
    width: 100%;
    aspect-ratio: 16 / 6;
    background: #f8f8f8;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    overflow: hidden;
  }
  .product-image-box svg, .product-image-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  
  .product-card-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.3px;
  }
  
  .studio { display: none; }
  .studio.active { display: block; }
  
  .preview-area {
    background: #1a1a1a; border-radius: 20px; position: relative;
    aspect-ratio: 3/4; overflow: hidden; margin-bottom: 16px;
  }
  
  #userVideo {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    transform: scaleX(-1); -webkit-transform: scaleX(-1);
  }
  
  #glassesCanvas {
    position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;
  }
  
  .preview-status {
    position: absolute; top: 14px; right: 14px;
    background: rgba(255,255,255,0.95); color: #1a1a1a;
    font-size: 11px; font-weight: 600; padding: 7px 14px;
    border-radius: 20px; z-index: 10; display: none;
    align-items: center; gap: 5px;
  }
  .preview-status.show { display: inline-flex; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
  .preview-status.warning .status-dot { background: #f59e0b; }
  
  .change-product-btn {
    position: absolute;
    bottom: 14px;
    right: 14px;
    background: rgba(255,255,255,0.95);
    border: none;
    padding: 10px 16px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    z-index: 10;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #1a1a1a;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    -webkit-appearance: none;
    font-family: inherit;
  }
  .change-product-btn svg { width: 14px; height: 14px; fill: currentColor; }
  
  .loading-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.92);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; gap: 14px; z-index: 20; padding: 20px; text-align: center;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 32px; height: 32px;
    border: 2.5px solid rgba(255,255,255,0.2); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .product-bar {
    background: #fff; border: 1px solid #f0f0f0; border-radius: 14px;
    padding: 14px 16px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 14px;
  }
  .product-thumb {
    width: 56px; height: 36px; background: #f5f5f5; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; padding: 4px;
  }
  .product-thumb svg, .product-thumb img { width: 100%; height: 100%; object-fit: contain; }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; font-family: 'Inter', sans-serif; letter-spacing: 0.3px; }
  
  /* === Match Card (during try-on) === */
  .match-card {
    background: linear-gradient(135deg, #fff 0%, #fafafa 100%);
    border: 1.5px solid #f0f0f0;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    transition: all 0.3s;
  }
  .match-card.perfect {
    border-color: #d4a85a;
    background: linear-gradient(135deg, #fff 0%, #fff8e8 100%);
    box-shadow: 0 4px 16px rgba(212, 168, 90, 0.15);
  }
  .match-card-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .match-stars-row {
    display: flex; align-items: center; gap: 8px;
  }
  .match-stars-big {
    color: #d4a85a;
    font-size: 16px;
    letter-spacing: 2px;
  }
  .match-rating-text {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a1a;
  }
  .match-percentage {
    font-size: 20px;
    font-weight: 800;
    color: #1a1a1a;
    font-family: 'Inter', sans-serif;
    letter-spacing: -0.5px;
  }
  .match-percentage.perfect { color: #b8893f; }
  
  .match-bar-wrap {
    width: 100%;
    height: 8px;
    background: #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .match-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #999, #1a1a1a);
    border-radius: 4px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .match-bar-fill.perfect {
    background: linear-gradient(90deg, #d4a85a, #b8893f);
  }
  .match-bar-fill.high {
    background: linear-gradient(90deg, #333, #1a1a1a);
  }
  
  .match-message {
    font-size: 12px;
    color: #666;
    line-height: 1.5;
    text-align: center;
    margin-top: 4px;
  }
  .match-message.perfect {
    color: #b8893f;
    font-weight: 600;
  }
  
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  
  .action-btn {
    background: #fff; border: 1.5px solid #e8e8e8; color: #1a1a1a;
    padding: 14px; border-radius: 12px; cursor: pointer;
    font-size: 13px; font-family: inherit; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    -webkit-appearance: none;
  }
  .action-btn:active { background: #f5f5f5; }
  .action-btn svg { width: 16px; height: 16px; }
  .action-btn.primary {
    background: #1a1a1a; border-color: #1a1a1a; color: #fff;
    grid-column: span 2; padding: 16px; font-size: 14px;
  }
  .action-btn.primary:active { background: #333; }
  
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: #1a1a1a; color: #fff; padding: 13px 22px;
    border-radius: 30px; font-size: 13px; z-index: 100;
    transition: transform 0.3s; max-width: 90%; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">

  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9c0-2 1-3 3-3h2l1-2h6l1 2h2c2 0 3 1 3 3v8c0 2-1 3-3 3H6c-2 0-3-1-3-3V9zm9 8c2.5 0 4.5-2 4.5-4.5S14.5 8 12 8s-4.5 2-4.5 4.5S9.5 17 12 17z"/></svg>
    </div>
    
    <h1 class="welcome-title">جربها قبل ما تشتريها</h1>
    <p class="welcome-sub">اختر النظارة وشوف كيف تبين على وجهك مباشرة</p>
    
    <button class="start-btn" id="startBtn">
      اختر نظارة وابدأ
      <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" transform="scale(-1 1) translate(-24 0)"/></svg>
    </button>
    
    <div class="privacy-note">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      صورك ما تطلع من جهازك أبداً
    </div>
  </div>

  <!-- شاشة تحليل الوجه -->
  <div class="analysis-screen" id="analysisScreen">
    <div class="screen-header">
      <button class="back-btn" id="analysisBackBtn">
        <svg viewBox="0 0 24 24"><path d="M12 4l1.41 1.41L7.83 11H20v2H7.83l5.58 5.59L12 20l-8-8 8-8z"/></svg>
      </button>
      <div class="screen-title">تحليل الوجه</div>
      <div class="header-spacer"></div>
    </div>
    
    <div class="analysis-preview">
      <video id="analysisVideo" autoplay playsinline muted webkit-playsinline></video>
      <canvas id="analysisCanvas"></canvas>
      
      <div class="analysis-overlay" id="analysisOverlay">
        <div class="analysis-icon pulse" id="analysisIconWrap">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <div class="analysis-title" id="analysisTitle">نحلل ملامح وجهك</div>
        <div class="analysis-sub" id="analysisSub">وجّه وجهك للكاميرا واثبت لحظة</div>
        <div class="analysis-progress">
          <div class="analysis-progress-bar" id="analysisProgressBar"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="selection-screen" id="selectionScreen">
    <div class="screen-header">
      <button class="back-btn" id="selectionBackBtn">
        <svg viewBox="0 0 24 24"><path d="M12 4l1.41 1.41L7.83 11H20v2H7.83l5.58 5.59L12 20l-8-8 8-8z"/></svg>
      </button>
      <div class="screen-title">اختر النظارة</div>
      <div class="header-spacer"></div>
    </div>
    
    <!-- سطر نتيجة التحليل -->
    <div class="face-match-banner" id="faceMatchBanner" style="display:none;">
      <div class="face-match-emoji" id="faceMatchEmoji">✨</div>
      <div class="face-match-info">
        <div class="face-match-title" id="faceMatchTitle">وجهك بيضاوي</div>
        <div class="face-match-desc" id="faceMatchDesc">رتّبنا النظارات الأنسب لك</div>
      </div>
    </div>
    
    <div class="products-grid" id="productsGrid"></div>
  </div>

  <div class="studio" id="studioScreen">
    
    <div class="screen-header">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24"><path d="M12 4l1.41 1.41L7.83 11H20v2H7.83l5.58 5.59L12 20l-8-8 8-8z"/></svg>
      </button>
      <div class="screen-title">التجربة الافتراضية</div>
      <div class="header-spacer"></div>
    </div>
    
    <div class="preview-area" id="previewArea">
      <video id="userVideo" autoplay playsinline muted webkit-playsinline></video>
      <canvas id="glassesCanvas"></canvas>
      
      <div class="preview-status" id="previewStatus">
        <span class="status-dot"></span>
        <span id="statusText"></span>
      </div>
      
      <button class="change-product-btn" id="changeProductBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 6V3L8 7l4 4V8c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 17.03 20 15.57 20 14c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 9.74C4.46 10.97 4 12.43 4 14c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        غيّر النظارة
      </button>
      
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingMessage" style="font-size: 13px;">جاري التحميل...</p>
      </div>
    </div>
    
    <div class="product-bar">
      <div class="product-thumb" id="currentProductThumb"></div>
      <div class="product-info">
        <div class="product-name" id="currentProductName">-</div>
      </div>
    </div>
    
    <!-- بطاقة تطابق النظارة مع شكل الوجه -->
    <div class="match-card" id="matchCard" style="display:none;">
      <div class="match-card-header">
        <div class="match-stars-row">
          <div class="match-stars-big" id="matchStarsBig">★★★★★</div>
          <div class="match-rating-text" id="matchRatingText">ممتاز</div>
        </div>
        <div class="match-percentage" id="matchPercentage">0%</div>
      </div>
      <div class="match-bar-wrap">
        <div class="match-bar-fill" id="matchBarFill"></div>
      </div>
      <div class="match-message" id="matchMessage">-</div>
    </div>
    
    <div class="action-grid">
      <button class="action-btn primary" id="downloadBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        احفظ الصورة
      </button>
      <button class="action-btn" id="shareBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
        مشاركة
      </button>
      <button class="action-btn" id="buyBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1z"/></svg>
        تسوّق
      </button>
    </div>
    
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js" crossorigin="anonymous"></script>

<script>
// ============================================
// المنتجات - Clear Grant بصورة حقيقية، الباقي SVG
// ============================================
var PRODUCTS = [
  {
    id: 'clear-grant',
    name: 'CLEAR GRANT',
    type: 'image',

// تحليل شكل الوجه من نقاط MediaPipe
// ============================================
function analyzeFaceShape(landmarks) {
  // النقاط المهمة لشكل الوجه:
  // 10  = أعلى الجبهة (forehead top)
  // 152 = الذقن (chin)
  // 234 = الصدغ الأيسر (left temple)
  // 454 = الصدغ الأيمن (right temple)
  // 103 = الجبهة اليسرى (left forehead)
  // 332 = الجبهة اليمنى (right forehead)
  // 172 = الفك الأيسر (left jaw)
  // 397 = الفك الأيمن (right jaw)
  // 132 = الوجنة اليسرى (left cheek)
  // 361 = الوجنة اليمنى (right cheek)
  
  var forehead = landmarks[10];
  var chin = landmarks[152];
  var foreheadL = landmarks[103];
  var foreheadR = landmarks[332];
  var cheekL = landmarks[234];
  var cheekR = landmarks[454];
  var jawL = landmarks[172];
  var jawR = landmarks[397];
  
  // طول الوجه (من الجبهة للذقن)
  var faceLength = Math.abs(chin.y - forehead.y);
  
  // عرض الجبهة
  var foreheadWidth = Math.abs(foreheadR.x - foreheadL.x);
  
  // عرض الوجنتين (أعرض جزء)
  var cheekWidth = Math.abs(cheekR.x - cheekL.x);
  
  // عرض الفك
  var jawWidth = Math.abs(jawR.x - jawL.x);
  
  // نسبة الطول للعرض
  var lengthToWidth = faceLength / cheekWidth;
  
  // نسبة الجبهة للوجنتين
  var foreheadToCheek = foreheadWidth / cheekWidth;
  
  // نسبة الفك للوجنتين
  var jawToCheek = jawWidth / cheekWidth;
  
  // التحديد:
  // - مستطيل: طويل جداً (نسبة طول/عرض > 1.5)
  // - دائري: متساوي تقريباً مع فك ناعم
  // - مربع: متساوي مع فك عريض حاد
  // - بيضاوي: متوسط مع تناسق
  // - قلب: الجبهة أعرض من الفك بكثير
  // - معيّن: الوجنتين أعرض من الجبهة والفك
  
  if (lengthToWidth > 1.5) {
    return 'oblong';  // مستطيل
  }
  
  if (foreheadToCheek > 0.92 && jawToCheek < 0.85) {
    return 'heart';   // قلب
  }
  
  if (foreheadToCheek < 0.85 && jawToCheek < 0.85) {
    return 'diamond'; // معيّن
  }
  
  if (lengthToWidth < 1.1) {
    if (jawToCheek > 0.92) {
      return 'square'; // مربع
    } else {
      return 'round';  // دائري
    }
  }
  
  return 'oval'; // بيضاوي (الافتراضي)
}

function getMatchScore(product, faceShape) {
  if (!faceShape || !product.suitsShapes) return 3;
  return product.suitsShapes[faceShape] || 3;
}

// رسائل مخصصة حسب التطابق وشكل الوجه
function getMatchMessage(score, faceShape, productName) {
  if (!faceShape || !FACE_SHAPES[faceShape]) {
    return 'جربها وشوف كيف تليق عليك';
  }
  var shapeName = FACE_SHAPES[faceShape].name;
  
  if (score >= 5) {
    var perfectMsgs = [
      'اختيار مثالي - ' + productName + ' صُممت لوجهك ال' + shapeName,
      'انسجام تام مع ملامحك - تليق بك جداً ✨',
      'ما فيه أنسب منها لوجهك ال' + shapeName,
      productName + ' = أنت. تطابق ممتاز 🏆'
    ];
    return perfectMsgs[Math.floor(Math.random() * perfectMsgs.length)];
  }
  if (score >= 4) {
    return 'تليق بك جداً - تكمّل ملامح وجهك ال' + shapeName;
  }
  if (score >= 3) {
    return 'اختيار جيد - تناسب وجهك بشكل مقبول';
  }
  return 'جربها، قد تفاجئك وتعجبك على وجهك';
}

function getRatingText(score) {
  if (score >= 5) return 'تطابق ممتاز';
  if (score >= 4) return 'تطابق عالي';
  if (score >= 3) return 'تطابق جيد';
  if (score >= 2) return 'تطابق متوسط';
  return 'جربها';
}

// نحول النقاط (1-5) لنسبة مئوية واقعية
function scoreToPercentage(score) {
  // 5 -> 92-98%
  // 4 -> 78-88%
  // 3 -> 65-75%
  // 2 -> 50-60%
  if (score >= 5) return 92 + Math.floor(Math.random() * 7);
  if (score >= 4) return 78 + Math.floor(Math.random() * 11);
  if (score >= 3) return 65 + Math.floor(Math.random() * 11);
  if (score >= 2) return 50 + Math.floor(Math.random() * 11);
  return 40 + Math.floor(Math.random() * 11);
}

function getMatchLabel(score) {
  if (score >= 5) return { text: 'مثالية لك', cls: 'perfect' };
  if (score >= 4) return { text: 'تليق بك', cls: 'high' };
  if (score >= 3) return { text: 'مناسبة', cls: '' };
  return { text: 'جربها', cls: '' };
}

function getStars(score) {
  var full = '★';
  var empty = '☆';
  return full.repeat(score) + empty.repeat(5 - score);
}

function smooth(prev, curr, f) { f = f || 0.4; if (prev === null || prev === undefined) return curr; return prev * (1 - f) + curr * f; }

function smoothDetection(curr) {
  if (!smoothed) { smoothed = JSON.parse(JSON.stringify(curr)); return smoothed; }
  smoothed.x = smooth(smoothed.x, curr.x, 0.5);
  smoothed.y = smooth(smoothed.y, curr.y, 0.5);
  smoothed.width = smooth(smoothed.width, curr.width, 0.4);
  smoothed.roll = smooth(smoothed.roll, curr.roll, 0.5);
  smoothed.yaw = smooth(smoothed.yaw, curr.yaw, 0.4);
  smoothed.pitch = smooth(smoothed.pitch, curr.pitch, 0.4);
  return smoothed;
}

function drawGlasses(det) {
  if (!glassesLoaded || !glassesImg) return;
  var w = det.width;
  var h = w * (glassesImg.height / glassesImg.width);
  ctx.save();
  ctx.translate(det.x, det.y);
  ctx.rotate(det.roll || 0);
  var pitchScale = Math.cos(det.pitch || 0);
  if (pitchScale < 0.3) pitchScale = 0.3;
  var yawAbs = Math.abs(det.yaw || 0);
  var yawScale = Math.cos(det.yaw || 0);
  if (yawScale < 0.2) yawScale = 0.2;
  
  // تدريج ناعم: النظارة تختفي تدريجياً مع اللف للجانب
  var fadeStart = Math.PI / 3;      // 60 درجة - تبدأ التلاشي
  var fadeEnd = Math.PI / 2;        // 90 درجة - تختفي تماماً
  var opacity = 1.0;
  if (yawAbs > fadeStart) {
    if (yawAbs >= fadeEnd) {
      opacity = 0;
    } else {
      opacity = 1 - (yawAbs - fadeStart) / (fadeEnd - fadeStart);
    }
  }
  
  ctx.globalAlpha = opacity;
  ctx.scale(yawScale, pitchScale);
  
  if (opacity > 0.01) {
    ctx.drawImage(glassesImg, -w/2, -h/2, w, h);
  }
  ctx.restore();
}

function fitCanvas() {
  var rect = previewArea.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  glassesCanvas.width = rect.width * dpr;
  glassesCanvas.height = rect.height * dpr;
  glassesCanvas.style.width = rect.width + 'px';
  glassesCanvas.style.height = rect.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
}

function initFaceMesh() {
  return new Promise(function(resolve, reject) {
    if (state.faceMesh) { resolve(state.faceMesh); return; }
    if (typeof FaceMesh === 'undefined') { reject(new Error('Library not loaded')); return; }
    try {
      var fm = new FaceMesh({ locateFile: function(file) { return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/' + file; } });
      fm.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
      fm.onResults(onFaceMeshResults);
      state.faceMesh = fm;
      resolve(fm);
    } catch (err) { reject(err); }
  });
}

function projectPoint(lm, sw, sh, cw, ch, mirror) {
  var sa = sw / sh, ca = cw / ch, dw, dh, ox, oy;
  if (sa > ca) { dh = ch; dw = ch * sa; ox = (cw - dw) / 2; oy = 0; }
  else { dw = cw; dh = cw / sa; ox = 0; oy = (ch - dh) / 2; }
  var px = lm.x * dw + ox, py = lm.y * dh + oy;
  if (mirror) px = cw - px;
  return { x: px, y: py };
}

function onFaceMeshResults(results) {
  var dpr = window.devicePixelRatio || 1;
  var logicalW = glassesCanvas.width / dpr;
  var logicalH = glassesCanvas.height / dpr;
  ctx.clearRect(0, 0, logicalW, logicalH);
  if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) {
    showStatus('وجّه وجهك للكاميرا', 'warning');
    return;
  }
  var lm = results.multiFaceLandmarks[0];
  var cw = logicalW, ch = logicalH;
  var sw = userVideo.videoWidth, sh = userVideo.videoHeight;
  if (!sw || !sh) return;
  var leftEye = projectPoint(lm[33], sw, sh, cw, ch, true);
  var rightEye = projectPoint(lm[263], sw, sh, cw, ch, true);
  var noseTip = projectPoint(lm[1], sw, sh, cw, ch, true);
  var forehead = projectPoint(lm[10], sw, sh, cw, ch, true);
  var chin = projectPoint(lm[152], sw, sh, cw, ch, true);
  var eyeMidX = (leftEye.x + rightEye.x) / 2;
  var eyeMidY = (leftEye.y + rightEye.y) / 2;
  var eyeDist = Math.sqrt(Math.pow(rightEye.x - leftEye.x, 2) + Math.pow(rightEye.y - leftEye.y, 2));
  var w = eyeDist * 1.7;
  var maxW = cw * 0.8;
  if (w > maxW) w = maxW;
  var cx = eyeMidX;
  var cy = eyeMidY + eyeDist * 0.15;
  var roll = Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x);
  var faceW = eyeDist;
  var yaw = -Math.atan((noseTip.x - eyeMidX) / (faceW / 2) * 0.8);
  var foreheadDist = Math.sqrt(Math.pow(forehead.x - eyeMidX, 2) + Math.pow(forehead.y - eyeMidY, 2));
  var chinDist = Math.sqrt(Math.pow(chin.x - eyeMidX, 2) + Math.pow(chin.y - eyeMidY, 2));
  var pitch = (chinDist / (foreheadDist + chinDist) - 0.65) * 1.5;
  lastDetection = smoothDetection({ x: cx, y: cy, width: w, roll: roll, yaw: yaw, pitch: pitch });
  drawGlasses(lastDetection);
  showStatus('جاهز', '');
}

// عرض بطاقة التطابق بأنيميشن
function showMatchCard(product) {
  var card = $('matchCard');
  
  // لو ما فيه تحليل وجه، نخفي البطاقة
  if (!state.faceShape) {
    card.style.display = 'none';
    return;
  }
  
  var score = getMatchScore(product, state.faceShape);
  var percentage = scoreToPercentage(score);
  var ratingText = getRatingText(score);
  var message = getMatchMessage(score, state.faceShape, product.name);
  
  // تحديث محتوى البطاقة
  $('matchStarsBig').textContent = getStars(score);
  $('matchRatingText').textContent = ratingText;
  $('matchMessage').textContent = message;
  
  // إضافة كلاس "perfect" للتطابق العالي جداً
  var isPerfect = score >= 5;
  var isHigh = score >= 4;
  
  card.className = 'match-card' + (isPerfect ? ' perfect' : '');
  $('matchPercentage').className = 'match-percentage' + (isPerfect ? ' perfect' : '');
  $('matchMessage').className = 'match-message' + (isPerfect ? ' perfect' : '');
  $('matchBarFill').className = 'match-bar-fill' + (isPerfect ? ' perfect' : isHigh ? ' high' : '');
  
  // إعادة تعيين البار
  $('matchBarFill').style.width = '0%';
  $('matchPercentage').textContent = '0%';
  
  card.style.display = 'block';
  
  // أنيميشن بعد فترة قصيرة
  setTimeout(function() {
    $('matchBarFill').style.width = percentage + '%';
    
    // عداد النسبة المئوية بأنيميشن
    var current = 0;
    var step = Math.max(1, Math.floor(percentage / 30));
    var counter = setInterval(function() {
      current += step;
      if (current >= percentage) {
        current = percentage;
        clearInterval(counter);
      }
      $('matchPercentage').textContent = current + '%';
    }, 40);
  }, 200);
}

function startCamera(product) {
  state.selectedProduct = product;
  state.active = true;
  smoothed = null;
  $('currentProductThumb').innerHTML = renderProductPreview(product);
  $('currentProductName').textContent = product.name;
  
  // عرض بطاقة التطابق إذا فيه تحليل وجه
  showMatchCard(product);
  
  showStudio();
  loadingOverlay.classList.add('show');
  loadingMessage.textContent = 'تجهيز النظارة...';
  loadGlassesImage(product).then(function() {
    loadingMessage.textContent = 'تشغيل الكاميرا...';
    return navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
  }).then(function(stream) {
    state.videoStream = stream;
    userVideo.srcObject = stream;
    return new Promise(function(r) { userVideo.onloadedmetadata = function() { userVideo.play(); r(); }; });
  }).then(function() {
    loadingMessage.textContent = 'تجهيز التتبع...';
    return initFaceMesh();
  }).then(function(fm) {
    // مهم: نرجع onResults للنظارة (لأنه ممكن كان شغّال للتحليل)
    fm.onResults(onFaceMeshResults);
    loadingOverlay.classList.remove('show');
    fitCanvas();
    function detect() {
      if (!state.active) return;
      if (!state.isProcessing && userVideo.readyState >= 2) {
        state.isProcessing = true;
        fm.send({ image: userVideo }).then(function() { state.isProcessing = false; }).catch(function() { state.isProcessing = false; });
      }
      requestAnimationFrame(detect);
    }
    detect();
  }).catch(function(err) {
    loadingOverlay.classList.remove('show');
    var msg = err.name === 'NotAllowedError' ? 'تم رفض إذن الكاميرا' : err.name === 'NotFoundError' ? 'ما لقيت كاميرا' : 'حصل خطأ';
    showToast(msg);
    setTimeout(showSelection, 2000);
  });
}

function showSelection() {
  state.active = false;
  state.isAnalyzing = false;
  if (state.videoStream) {
    var tracks = state.videoStream.getTracks();
    for (var i = 0; i < tracks.length; i++) tracks[i].stop();
    state.videoStream = null;
  }
  
  // إخفاء بطاقة التطابق
  $('matchCard').style.display = 'none';
  
  welcomeScreen.style.display = 'none';
  studioScreen.classList.remove('active');
  $('analysisScreen').classList.remove('active');
  selectionScreen.classList.add('active');
  
  // عرض سطر التحليل إذا فيه نتيجة
  if (state.faceShape && FACE_SHAPES[state.faceShape]) {
    var info = FACE_SHAPES[state.faceShape];
    $('faceMatchBanner').style.display = 'flex';
    $('faceMatchEmoji').textContent = info.emoji;

    $('faceMatchBanner').style.display = 'none';
  }

}

function startFaceAnalysis() {
  welcomeScreen.style.display = 'none';
  selectionScreen.classList.remove('active');
  studioScreen.classList.remove('active');
  $('analysisScreen').classList.add('active');
  
  state.isAnalyzing = true;
  state.analysisSamples = [];
  
  $('analysisTitle').textContent = 'نحضّر الكاميرا...';
  $('analysisSub').textContent = 'وجّه وجهك للكاميرا واثبت لحظة';
  $('analysisProgressBar').style.width = '0%';
  
  var analysisVideo = $('analysisVideo');
  var analysisCanvas = $('analysisCanvas');
  
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, 
    audio: false
  }).then(function(stream) {
    state.videoStream = stream;
    analysisVideo.srcObject = stream;
    return new Promise(function(r) { 
      analysisVideo.onloadedmetadata = function() { analysisVideo.play(); r(); }; 
    });
  }).then(function() {
    $('analysisTitle').textContent = 'نحلل ملامح وجهك';
    return initFaceMesh();
  }).then(function(fm) {
    // نضبط الدالة لتحلل الوجه
    fm.onResults(onAnalysisResults);
    
    function analyzeLoop() {
      if (!state.isAnalyzing) return;
      if (!state.isProcessing && analysisVideo.readyState >= 2) {
        state.isProcessing = true;
        fm.send({ image: analysisVideo }).then(function() { 
          state.isProcessing = false; 
        }).catch(function() { 
          state.isProcessing = false; 
        });
      }
      requestAnimationFrame(analyzeLoop);
    }
    analyzeLoop();
  }).catch(function(err) {
    var msg = err.name === 'NotAllowedError' ? 'تم رفض إذن الكاميرا' : 
              err.name === 'NotFoundError' ? 'ما لقيت كاميرا' : 'حصل خطأ';
    $('analysisTitle').textContent = msg;
    $('analysisSub').textContent = 'ارجع وحاول مرة ثانية';
    $('analysisIconWrap').classList.remove('pulse');
    state.isAnalyzing = false;
  });
}

function onAnalysisResults(results) {
  if (!state.isAnalyzing) return;
  
  if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) {
    $('analysisTitle').textContent = 'وجّه وجهك للكاميرا';
    $('analysisSub').textContent = 'نحتاج نشوف وجهك كاملاً';
    return;
  }
  
  var lm = results.multiFaceLandmarks[0];
  var shape = analyzeFaceShape(lm);
  
  // نجمع عينات للتحليل (أكثر دقة)
  state.analysisSamples.push(shape);
  
  // تحديث شريط التقدم
  var requiredSamples = 30;
  var progress = Math.min(100, (state.analysisSamples.length / requiredSamples) * 100);
  $('analysisProgressBar').style.width = progress + '%';
  
  if (state.analysisSamples.length >= requiredSamples) {
    // نأخذ الأكثر شيوعاً
    var counts = {};
    for (var i = 0; i < state.analysisSamples.length; i++) {
      var s = state.analysisSamples[i];
      counts[s] = (counts[s] || 0) + 1;
    }
    var maxCount = 0;
    var finalShape = 'oval';
    for (var key in counts) {
      if (counts[key] > maxCount) {
        maxCount = counts[key];
        finalShape = key;
      }
    }
    
    state.faceShape = finalShape;
    state.isAnalyzing = false;
    
    // إظهار النتيجة لمدة 1.5 ثانية
    var info = FACE_SHAPES[finalShape];
    $('analysisIconWrap').classList.remove('pulse');
    $('analysisTitle').textContent = info.emoji + ' وجهك ' + info.name;
    $('analysisSub').textContent = info.desc;
    $('analysisProgressBar').style.width = '100%';
    
    setTimeout(function() {
      showSelection();
    }, 1800);
  }
}

function renderProductsGrid() {
  var grid = $('productsGrid');
  
  // نسوي نسخة من المنتجات مع نسبة التطابق
  var productsWithScore = PRODUCTS.map(function(p) {
    return {
      product: p,
      score: getMatchScore(p, state.faceShape)
    };
  });
  
  // نرتب حسب الأنسب (لو فيه تحليل وجه)
  if (state.faceShape) {
    productsWithScore.sort(function(a, b) {
      return b.score - a.score;
    });
  }
  
  var html = '';
  for (var i = 0; i < productsWithScore.length; i++) {
    var p = productsWithScore[i].product;
    var score = productsWithScore[i].score;
    var label = getMatchLabel(score);
    
    html += '<button class="product-card" data-id="' + p.id + '">';
    html += '<div class="product-image-box">' + renderProductPreview(p) + '</div>';
    html += '<div class="product-card-name">' + p.name + '</div>';
    
    // إذا فيه تحليل وجه، نعرض النجوم والشارة
    if (state.faceShape) {
      html += '<div class="match-stars">' + getStars(score) + '</div>';
      if (label.cls) {
        html += '<div class="match-badge ' + label.cls + '">' + label.text + '</div>';
      }
    }
    
    html += '</button>';
  }
  grid.innerHTML = html;
  
  var cards = grid.querySelectorAll('.product-card');
  for (var j = 0; j < cards.length; j++) {
    cards[j].addEventListener('click', function() {
      var id = this.getAttribute('data-id');
      var product = null;
      for (var k = 0; k < PRODUCTS.length; k++) {
        if (PRODUCTS[k].id === id) { product = PRODUCTS[k]; break; }
      }
      if (product) startCamera(product);
    });
  }
}

function showStudio() {
  welcomeScreen.style.display = 'none';
  selectionScreen.classList.remove('active');
  studioScreen.classList.add('active');
  setTimeout(fitCanvas, 100);
}

function showWelcome() {
  state.active = false;
  if (state.videoStream) {
    var tracks = state.videoStream.getTracks();
    for (var i = 0; i < tracks.length; i++) tracks[i].stop();
    state.videoStream = null;
  }
  studioScreen.classList.remove('active');
  selectionScreen.classList.remove('active');
  welcomeScreen.style.display = 'block';
  lastDetection = null;
  smoothed = null;
}

function showStatus(text, type) {
  if (!text) { previewStatus.classList.remove('show'); return; }
  statusText.textContent = text;
  previewStatus.className = 'preview-status show ' + (type || '');
}

function showToast(text) {
  toast.textContent = text;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 3000);
}

window.addEventListener('DOMContentLoaded', function() {
  welcomeScreen = $('welcomeScreen');
  selectionScreen = $('selectionScreen');
  studioScreen = $('studioScreen');
  userVideo = $('userVideo');
  glassesCanvas = $('glassesCanvas');
  previewArea = $('previewArea');
  previewStatus = $('previewStatus');
  statusText = $('statusText');
  loadingOverlay = $('loadingOverlay');
  loadingMessage = $('loadingMessage');
  toast = $('toast');
  ctx = glassesCanvas.getContext('2d');
  
  $('startBtn').addEventListener('click', function() {
    // لو ما حللنا الوجه بعد، نبدأ التحليل
    // لو حللناه قبل، نروح مباشرة للمعرض
    if (state.faceShape) {
      showSelection();
    } else {
      startFaceAnalysis();
    }
  });
  $('analysisBackBtn').addEventListener('click', function() {
    state.isAnalyzing = false;
    if (state.videoStream) {
      var tracks = state.videoStream.getTracks();
      for (var i = 0; i < tracks.length; i++) tracks[i].stop();
      state.videoStream = null;
    }
    showWelcome();
  });
  $('selectionBackBtn').addEventListener('click', showWelcome);
  $('backBtn').addEventListener('click', showSelection);
  $('changeProductBtn').addEventListener('click', showSelection);
  
  $('downloadBtn').addEventListener('click', function() {
    if (!lastDetection) { showToast('انتظر لحظة...'); return; }
    var ex = document.createElement('canvas');
    var rect = previewArea.getBoundingClientRect();
    ex.width = rect.width * 2;
    ex.height = rect.height * 2;
    var ectx = ex.getContext('2d');
    ectx.scale(2, 2);
    ectx.save();
    ectx.scale(-1, 1);
    ectx.drawImage(userVideo, -rect.width, 0, rect.width, rect.height);
    ectx.restore();
    ectx.drawImage(glassesCanvas, 0, 0, rect.width, rect.height);
    var link = document.createElement('a');
    link.download = 'tryon-' + Date.now() + '.png';
    try {
      link.href = ex.toDataURL('image/png');
      link.click();
      showToast('تم الحفظ ✓');
    } catch (e) {
      showToast('احفظ Screenshot من جوالك');
    }
  });
  
  $('shareBtn').addEventListener('click', function() {
    if (navigator.share) {
      navigator.share({ title: 'جربت النظارة', text: 'شوف كيف تبين 👓', url: window.location.href }).catch(function() {});
    } else {
      if (navigator.clipboard) navigator.clipboard.writeText(window.location.href);
      showToast('تم نسخ الرابط ✓');
    }
  });
  
  $('buyBtn').addEventListener('click', function() { window.open('/', '_top'); });
  
  window.addEventListener('resize', function() {
    if (studioScreen.classList.contains('active')) { fitCanvas(); }
  });
});
</script>
</body>
</html>
