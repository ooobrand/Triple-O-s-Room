<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 اختبار Worker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, sans-serif; }
body { background: #f0f0f0; padding: 20px; }
.container { max-width: 800px; margin: 0 auto; }
h1 { color: #1d1d1f; margin-bottom: 20px; font-size: 22px; }
.upload-area {
  background: white; border: 2px dashed #ccc; border-radius: 16px;
  padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer;
  transition: all 0.3s;
}
.upload-area:hover { border-color: #007aff; background: #f8f9fa; }
input[type="file"] { display: none; }
.btn {
  display: inline-block; padding: 12px 24px; background: #007aff; color: white;
  border-radius: 10px; border: none; font-size: 15px; cursor: pointer;
  font-weight: 600;
}
.btn:hover { background: #0051d5; }
.preview { max-width: 200px; border-radius: 12px; margin: 16px auto; display: block; }
.result {
  background: white; border-radius: 16px; padding: 20px; margin-top: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.result h2 { font-size: 16px; color: #1d1d1f; margin-bottom: 12px; }
.json-display {
  background: #1d1d1f; color: #50e3c2; padding: 16px; border-radius: 10px;
  font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6;
  white-space: pre-wrap; word-wrap: break-word; overflow-x: auto;
  max-height: 500px; overflow-y: auto;
}
.status { padding: 10px 16px; border-radius: 8px; margin-bottom: 12px; font-weight: 600; }
.status.loading { background: #fef3cd; color: #856404; }
.status.success { background: #d4edda; color: #155724; }
.status.error { background: #f8d7da; color: #721c24; }
.section { margin-bottom: 16px; }
.section-title { font-weight: 700; color: #1d1d1f; margin-bottom: 6px; font-size: 14px; }
.section-value { color: #555; background: #f5f5f7; padding: 10px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
.tag { 
  display: inline-block; padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; margin-right: 4px;
}
.tag.very_compatible { background: #b8893f; color: white; }
.tag.compatible { background: #1d8348; color: white; }
.tag.neutral { background: #7f8c8d; color: white; }
.tag.not_recommended { background: #c0392b; color: white; }
.rec-card { 
  background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 8px;
  border-right: 3px solid #ddd;
}
.rec-card.very_compatible { border-color: #b8893f; }
.rec-card.compatible { border-color: #1d8348; }
.rec-card.neutral { border-color: #7f8c8d; }
.rec-card.not_recommended { border-color: #c0392b; }
.rec-name { font-weight: 700; margin-bottom: 4px; }
.rec-reason { font-size: 12px; color: #666; }
</style>
</head>
<body>

<div class="container">
  <h1>🔬 اختبار Worker مباشر</h1>
  
  <label class="upload-area" for="fileInput">
    <div style="font-size: 48px; margin-bottom: 12px;">📸</div>
    <div style="font-weight: 600; margin-bottom: 8px;">ارفع صورة وجه واضحة</div>
    <div style="color: #999; font-size: 13px;">اضغط هنا لاختيار صورة</div>
    <input type="file" id="fileInput" accept="image/*">
  </label>
  
  <img id="preview" class="preview" style="display:none;">
  
  <div id="status"></div>
  <div id="results"></div>
</div>

<script>
var WORKER_URL = 'https://claude-vision.ooobrand-sa.workers.dev';

document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  
  var reader = new FileReader();
  reader.onload = function(event) {
    var base64 = event.target.result;
    
    // عرض الصورة
    var preview = document.getElementById('preview');
    preview.src = base64;
    preview.style.display = 'block';
    
    // إرسال للـ Worker
    sendToWorker(base64);
  };
  reader.readAsDataURL(file);
});

function sendToWorker(base64) {
  var statusEl = document.getElementById('status');
  var resultsEl = document.getElementById('results');
  
  statusEl.innerHTML = '<div class="status loading">⏳ جار التحليل... (5-10 ثواني)</div>';
  resultsEl.innerHTML = '';
  
  var startTime = Date.now();
  
  fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ image: base64 })
  })
  .then(function(response) {
    return response.json().then(function(data) {
      return { status: response.status, ok: response.ok, data: data };
    });
  })
  .then(function(result) {
    var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    
    if (result.ok && result.data.success) {
      statusEl.innerHTML = '<div class="status success">✅ نجح التحليل في ' + elapsed + 's</div>';
      displayResult(result.data);
    } else {
      statusEl.innerHTML = '<div class="status error">❌ فشل (Status: ' + result.status + ')</div>';
      displayRawJson(result.data);
    }
  })
  .catch(function(err) {
    statusEl.innerHTML = '<div class="status error">❌ خطأ: ' + err.message + '</div>';
  });
}

function displayResult(data) {
  var html = '<div class="result">';
  html += '<h2>📊 الرد من Worker</h2>';
  
  // الشكل
  html += '<div class="section">';
  html += '<div class="section-title">🎯 شكل الوجه:</div>';
  html += '<div class="section-value">' + (data.shape || 'غير محدد') + '</div>';
  html += '</div>';
  
  // التحليل (لو موجود)
  if (data.analysis) {
    html += '<div class="section">';
    html += '<div class="section-title">📝 التحليل الشخصي:</div>';
    html += '<div class="section-value">' + data.analysis + '</div>';
    html += '</div>';
  } else {
    html += '<div class="section">';
    html += '<div class="section-title">⚠️ التحليل الشخصي:</div>';
    html += '<div class="section-value" style="color:#c0392b;">غير موجود! (الـ Prompt الجديد ما اشتغل)</div>';
    html += '</div>';
  }
  
  // التوصيات
  if (data.recommendations) {
    html += '<div class="section">';
    html += '<div class="section-title">🛍️ توصيات Claude:</div>';
    var compatLabels = {
      'very_compatible': '⭐ متوافقة جداً',
      'compatible': '✓ متوافقة',
      'neutral': '◯ محايدة',
      'not_recommended': '⚠️ ما ننصحك فيها'
    };
    
    Object.keys(data.recommendations).forEach(function(productId) {
      var rec = data.recommendations[productId];
      html += '<div class="rec-card ' + rec.compatibility + '">';
      html += '<div class="rec-name">' + productId + ' <span class="tag ' + rec.compatibility + '">' + (compatLabels[rec.compatibility] || rec.compatibility) + '</span></div>';
      html += '<div class="rec-reason">' + (rec.reason || '') + '</div>';
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="section">';
    html += '<div class="section-title">⚠️ التوصيات:</div>';
    html += '<div class="section-value" style="color:#c0392b;">غير موجودة! (Worker القديم لسه شغّال أو JSON فشل)</div>';
    html += '</div>';
  }
  
  // JSON الخام
  html += '<div class="section">';
  html += '<div class="section-title">🔧 JSON الكامل (للتشخيص):</div>';
  html += '<div class="json-display">' + JSON.stringify(data, null, 2) + '</div>';
  html += '</div>';
  
  // التشخيص النهائي
  html += '<div class="section">';
  html += '<div class="section-title">🎯 التشخيص:</div>';
  if (data.analysis && data.recommendations) {
    html += '<div class="section-value" style="background:#d4edda;color:#155724;font-weight:700;">✅ Worker الجديد شغّال 100% - التحليل العميق يعمل!</div>';
  } else if (data.fallback) {
    html += '<div class="section-value" style="background:#fef3cd;color:#856404;font-weight:700;">⚠️ Worker الجديد منشور لكن JSON فشل - نحتاج نعدل الـ Prompt</div>';
    if (data.rawText) {
      html += '<div style="margin-top:10px;font-size:12px;color:#666;"><strong>رد Claude الخام:</strong><br>' + data.rawText.substring(0, 300) + '</div>';
    }
  } else {
    html += '<div class="section-value" style="background:#f8d7da;color:#721c24;font-weight:700;">❌ Worker القديم لسه شغّال - Deploy ما اشتغل</div>';
  }
  html += '</div>';
  
  html += '</div>';
  document.getElementById('results').innerHTML = html;
}

function displayRawJson(data) {
  var html = '<div class="result">';
  html += '<h2>🔧 رد Worker الخام:</h2>';
  html += '<div class="json-display">' + JSON.stringify(data, null, 2) + '</div>';
  html += '</div>';
  document.getElementById('results').innerHTML = html;
}
</script>

</body>
</html>
